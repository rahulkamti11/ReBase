<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
        }

        header {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        article,
        aside {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        article h2 {
            margin-bottom: 10px;
        }

        aside h3 {
            margin-bottom: 10px;
        }

        aside ul {
            list-style: none;
        }

        aside li {
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Blog</h1>
    </header>

    <div class="container">
        <article>
            <h2>How to Learn Web Development</h2>
            <p>
                Start with HTML, then CSS, then JavaScript.
                Build projects consistently and practice daily.
            </p>
        </article>

        <aside>
            <h3>Recent Posts</h3>
            <ul>
                <li>HTML Basics</li>
                <li>CSS Layout Tricks</li>
                <li>JavaScript Arrays</li>
            </ul>
        </aside>
    </div>

</body>
</html>
