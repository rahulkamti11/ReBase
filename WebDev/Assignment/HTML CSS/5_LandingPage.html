<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Landing Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #0d6efd;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        header p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            background-color: white;
            color: #0d6efd;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .features {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .box {
            background-color: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Launch Your Startup</h1>
        <p>Build faster. Grow smarter. Scale better.</p>
        <a href="#" class="btn">Get Started</a>
    </header>

    <section class="features">
        <div class="box">
            <h3>Fast Setup</h3>
            <p>Start in minutes with clean tools.</p>
        </div>

        <div class="box">
            <h3>Secure</h3>
            <p>Your data stays protected.</p>
        </div>

        <div class="box">
            <h3>Analytics</h3>
            <p>Track growth with insights.</p>
        </div>
    </section>

</body>
</html>
