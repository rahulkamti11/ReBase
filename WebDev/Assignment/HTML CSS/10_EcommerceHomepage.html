<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Homepage</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
        }

        header {
            background-color: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .hero {
            background-color: #0d6efd;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        .products {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }

        .image {
            height: 140px;
            background-color: #ddd;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 10px 16px;
            border: none;
            background-color: #111;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Store</h1>
    </header>

    <section class="hero">
        <h1>Best Deals Today</h1>
        <p>Shop latest products at low prices</p>
    </section>

    <section class="products">

        <div class="product">
            <div class="image">Image</div>
            <h3>Smart Watch</h3>
            <p>₹2999</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <div class="image">Image</div>
            <h3>Headphones</h3>
            <p>₹1999</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <div class="image">Image</div>
            <h3>Keyboard</h3>
            <p>₹1499</p>
            <button>Buy Now</button>
        </div>

    </section>

</body>
</html>
